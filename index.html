<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KatataApps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 8px;
      color: #6e6e73;
      font-size: 0.95rem;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 560px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: box-shadow 0.2s;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .card a {
      display: inline-block;
      color: #0071e3;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 6px 0;
    }

    .card a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 48px;
      color: #6e6e73;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>KatataApps</h1>
    <p>アプリ一覧 &amp; プライバシーポリシー</p>
  </header>

  <main class="card-list">

    <div class="card">
      <h2>HabitSpin（ハビットスピン）</h2>
      <a href="HabitSpin/privacy_policy">プライバシーポリシー</a>
    </div>

    <div class="card">
      <h2>KanjiNote（かんじノート）</h2>
      <a href="KanjiNote/privacy_policy">プライバシーポリシー</a>
    </div>
    
  </main>

  <footer>
    <p>&copy; 2026 KatataApps</p>
  </footer>
</body>
</html>
